services:
  app:
    container_name: karir-app
    build:
      context: .
      dockerfile: docker/Dockerfile.frankenphp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - karir-storage:/app/storage
      - karir-bootstrap-cache:/app/bootstrap/cache
    networks:
      - default
      - workspace_local-dev
    labels:
      - traefik.enable=true
      - traefik.http.routers.karir.rule=Host(`karir.nusantaraabadijaya.com`)
      - traefik.http.routers.karir.entrypoints=websecure
      - traefik.http.routers.karir.tls.certresolver=letsencrypt
      - traefik.http.services.karir.loadbalancer.server.port=80

  queue:
    container_name: karir-queue
    build:
      context: .
      dockerfile: docker/Dockerfile.frankenphp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - karir-storage:/app/storage
      - karir-bootstrap-cache:/app/bootstrap/cache
    networks:
      - default

  mysql:
    container_name: karir-mysql
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-karir}
      MYSQL_USER: ${DB_USERNAME:-karir}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root-secret}
    ports:
      - ${DB_FORWARD_PORT:-3307}:3306
    volumes:
      - karir-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD:-root-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  karir-storage:
  karir-bootstrap-cache:
  karir-mysql-data:

networks:
  workspace_local-dev:
    external: true
